name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - main
      - develop

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check Conventional Commits format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            refactor
            test
            perf
          requireScope: false
